services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: rikkei_bank
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-anlinh.99}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
volumes:
  mysql-data:
